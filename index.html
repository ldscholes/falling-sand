<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falling Sands</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    user-select: none;
  }

  /* --- Menu --- */
  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }
  #menu h1 {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #d4a647 0%, #e85d26 50%, #4a7fb5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #menu h1 span {
    font-size: 18px;
    display: block;
    text-align: center;
    font-weight: 400;
    -webkit-text-fill-color: #888;
  }
  .menu-btn {
    width: 260px;
    padding: 16px 0;
    border: 2px solid #444;
    border-radius: 10px;
    background: #252540;
    color: #e0e0e0;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .menu-btn:hover { background: #333355; border-color: #777; transform: scale(1.04); }

  /* --- Level Select --- */
  #level-select {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #level-select h2 { font-size: 28px; font-weight: 700; }
  #level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 500px;
  }
  .level-card {
    padding: 16px;
    border: 2px solid #444;
    border-radius: 10px;
    background: #252540;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    min-width: 150px;
  }
  .level-card:hover { background: #333355; border-color: #777; transform: scale(1.04); }
  .level-card .num { font-size: 28px; font-weight: 800; color: #d4a647; }
  .level-card .name { font-size: 13px; color: #aaa; margin-top: 4px; }
  .back-btn {
    padding: 8px 24px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #333;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 14px;
  }
  .back-btn:hover { background: #555; }

  /* --- Game UI --- */
  #game { display: none; flex-direction: column; align-items: center; }
  #level-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 6px;
  }
  #level-header h3 { font-size: 16px; font-weight: 700; }
  #objective {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
    text-align: center;
    max-width: 600px;
  }
  #toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
  }
  .mat-btn {
    padding: 5px 12px;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    transition: transform 0.1s, border-color 0.15s;
  }
  .mat-btn:hover { transform: scale(1.08); }
  .mat-btn.active { border-color: #fff; transform: scale(1.1); }
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  #controls label { display: flex; align-items: center; gap: 6px; }
  #controls input[type="range"] { width: 80px; }
  .ctrl-btn {
    padding: 4px 12px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #333;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
  }
  .ctrl-btn:hover { background: #555; }
  canvas {
    border: 2px solid #333;
    border-radius: 4px;
    image-rendering: pixelated;
    cursor: crosshair;
  }
  #footer {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
  }

  /* --- Win overlay --- */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #win-overlay.show { display: flex; }
  #win-box {
    background: #252540;
    border: 2px solid #d4a647;
    border-radius: 16px;
    padding: 40px 50px;
    text-align: center;
  }
  #win-box h2 {
    font-size: 32px;
    color: #d4a647;
    margin-bottom: 12px;
  }
  #win-box p { color: #aaa; margin-bottom: 24px; }
  #win-buttons { display: flex; gap: 12px; justify-content: center; }
  #win-buttons button {
    padding: 10px 24px;
    border: 2px solid #555;
    border-radius: 8px;
    background: #333;
    color: #e0e0e0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  #win-buttons button:hover { background: #555; border-color: #888; }
  #win-buttons button.primary { background: #d4a647; color: #1a1a2e; border-color: #d4a647; }
  #win-buttons button.primary:hover { background: #e8b94a; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>Falling Sands<span>a particle simulation</span></h1>
  <button class="menu-btn" onclick="showLevelSelect()">Levels</button>
  <button class="menu-btn" onclick="startSandbox()">Sandbox</button>
  <button class="menu-btn" onclick="startTestingSandbox()">Sandbox (Testing)</button>
</div>

<!-- LEVEL SELECT -->
<div id="level-select">
  <h2>Select Level</h2>
  <div id="level-grid"></div>
  <button class="back-btn" onclick="showMenu()">Back</button>
</div>

<!-- GAME -->
<div id="game">
  <div id="level-header">
    <button class="back-btn" id="game-back-btn">Menu</button>
    <h3 id="level-title"></h3>
    <button class="ctrl-btn" id="reset-btn">Reset</button>
    <span id="fps-display">0 FPS</span>
  </div>
  <div id="objective"></div>
  <div id="toolbar"></div>
  <div id="controls">
    <label>Brush: <input type="range" id="brush-size" min="1" max="12" value="3"> <span id="brush-val">3</span></label>
    <button class="ctrl-btn" id="clear-btn">Clear Placed</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="footer">Click &amp; drag to place materials &middot; Keyboard shortcuts shown on buttons</div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div id="win-box">
    <h2>Level Complete!</h2>
    <p id="win-msg"></p>
    <div id="win-buttons">
      <button onclick="returnToLevels()">Level Select</button>
      <button class="primary" id="next-level-btn" onclick="nextLevel()">Next Level</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  MATERIAL TYPES
// ============================================================
const EMPTY = 0, SAND = 1, WATER = 2, STONE = 3, FIRE = 4, WOOD = 5,
      OIL = 6, SMOKE = 7, ACID = 8, PLANT = 9, WALL = 10, GUNPOWDER = 11, C4 = 12,
      GUNPOWDER_LIT = 13, C4_LIT = 14, DYNAMITE = 15, DYNAMITE_LIT = 16,
      BLACKHOLE = 17, GAS = 18, LAVA = 19, ICE = 20, STEAM = 21,
      METAL = 22, MUD = 23, GLASS = 24, VIRUS = 25, CLONE = 26, VOID = 27,
      WET_WOOD = 28, PORTAL_BLUE = 29, PORTAL_ORANGE = 30, HOPPER = 31, HOPPER_FIRE = 32,
      FUSE = 33, FUSE_LIT = 34, NITRO = 35, NITRO_LIT = 36,
      FIREWORK = 37, FIREWORK_LIT = 38;

const PORTAL = 99; // virtual ID for the tool selector

const ALL_MATERIALS = [
  { id: SAND,  name: 'Sand',  key: '1', bg: '#d4a647' },
  { id: WATER, name: 'Water', key: '2', bg: '#4a7fb5' },
  { id: STONE, name: 'Stone', key: '3', bg: '#888888' },
  { id: FIRE,  name: 'Fire',  key: '4', bg: '#e85d26' },
  { id: WOOD,  name: 'Wood',  key: '5', bg: '#8b5e3c' },
  { id: OIL,   name: 'Oil',   key: '6', bg: '#3d2b1f' },
  { id: SMOKE, name: 'Smoke', key: '7', bg: '#666666' },
  { id: ACID,  name: 'Acid',  key: '8', bg: '#7fff00' },
  { id: PLANT, name: 'Plant', key: '9', bg: '#2e8b2e' },
  { id: GUNPOWDER, name: 'Gunpowder', key: 'q', bg: '#333333' },
  { id: C4,        name: 'C4',        key: 'w', bg: '#556b2f' },
  { id: DYNAMITE,  name: 'Dynamite',  key: 'e', bg: '#cc2200' },
  { id: BLACKHOLE, name: 'Black Hole', key: 'r', bg: '#110022' },
  { id: GAS,       name: 'Gas',        key: 't', bg: '#98fb98' },
  { id: LAVA,      name: 'Lava',       key: 'a', bg: '#ff4500' },
  { id: ICE,       name: 'Ice',        key: 's', bg: '#b0e0e6' },
  { id: STEAM,     name: 'Steam',      key: 'd', bg: '#d0d8e0' },
  { id: METAL,     name: 'Metal',      key: 'f', bg: '#708090' },
  { id: MUD,       name: 'Mud',        key: 'g', bg: '#6b4423' },
  { id: GLASS,     name: 'Glass',      key: 'h', bg: '#c8e8ff' },
  { id: VIRUS,     name: 'Virus',      key: 'z', bg: '#9932cc' },
  { id: CLONE,     name: 'Clone',      key: 'x', bg: '#ff69b4' },
  { id: VOID,      name: 'Void',       key: 'c', bg: '#000000' },
  { id: PORTAL,    name: 'Portal',     key: 'v', bg: 'linear-gradient(90deg, #0066ff, #ff6600)' },
  { id: HOPPER,    name: 'Hopper',     key: 'b', bg: '#e04080' },
  { id: FUSE,      name: 'Fuse',       key: 'n', bg: '#8b6914' },
  { id: NITRO,     name: 'Nitro',      key: 'm', bg: '#00cccc' },
  { id: FIREWORK,  name: 'Firework',   key: ',', bg: '#ff1493' },
];

// ============================================================
//  LEVEL DEFINITIONS
// ============================================================
const LEVELS = [
  {
    id: 1,
    name: 'The Aqueduct',
    objective: 'Guide the water from the top-left into the basin on the right. Use sand or stone to build a channel.',
    materials: [SAND, STONE],
    winZone: { x1: 230, y1: 170, x2: 270, y2: 195 },
    winType: WATER,
    winCount: 80,
    setup(setCell) {
      // water source: drip from top-left
      this._sourceX = 30; this._sourceY = 0;
      // left platform
      hLine(setCell, 10, 70, 50, WALL);
      // right basin
      vLine(setCell, 225, 140, 195, WALL);
      vLine(setCell, 275, 140, 195, WALL);
      hLine(setCell, 225, 275, 195, WALL);
      // label the basin with a floor marker
      hLine(setCell, 230, 270, 170, WALL);
      // gap in the marker for flow
      for (let x = 240; x <= 260; x++) setCell(x, 170, EMPTY);
    },
    tick(setCell, getType, tick) {
      // drip water
      if (tick % 3 === 0) {
        const wx = 30 + Math.floor(Math.random() * 3);
        if (getType(wx, 0) === EMPTY) setCell(wx, 0, WATER);
      }
    }
  },
  {
    id: 2,
    name: 'Burn It Down',
    objective: 'A wooden wall blocks the sand. Use fire to burn through it and fill the target zone below.',
    materials: [FIRE],
    winZone: { x1: 130, y1: 175, x2: 170, y2: 195 },
    winType: SAND,
    winCount: 60,
    setup(setCell) {
      // wooden wall across the middle
      for (let x = 100; x <= 200; x++) {
        for (let y = 100; y <= 108; y++) {
          setCell(x, y, WOOD);
        }
      }
      // indestructible frame
      vLine(setCell, 99, 60, 195, WALL);
      vLine(setCell, 201, 60, 195, WALL);
      hLine(setCell, 99, 201, 195, WALL);
      // sand pile above
      for (let x = 110; x <= 190; x++) {
        for (let y = 60; y <= 95; y++) {
          if (Math.random() < 0.9) setCell(x, y, SAND);
        }
      }
      // target zone marker
      hLine(setCell, 128, 172, 175, WALL);
      for (let x = 135; x <= 165; x++) setCell(x, 175, EMPTY); // gap
    }
  },
  {
    id: 3,
    name: 'Acid Bath',
    objective: 'A stone wall blocks the water pipe. Use acid to dissolve it and let water reach the basin.',
    materials: [ACID],
    winZone: { x1: 130, y1: 170, x2: 170, y2: 195 },
    winType: WATER,
    winCount: 60,
    setup(setCell) {
      // pipe walls
      vLine(setCell, 120, 10, 195, WALL);
      vLine(setCell, 180, 10, 195, WALL);
      // stone barrier
      for (let x = 121; x <= 179; x++) {
        for (let y = 100; y <= 106; y++) {
          setCell(x, y, STONE);
        }
      }
      hLine(setCell, 120, 180, 195, WALL);
      // target marker
      hLine(setCell, 128, 172, 170, WALL);
      for (let x = 138; x <= 162; x++) setCell(x, 170, EMPTY);
    },
    tick(setCell, getType, tick) {
      if (tick % 4 === 0) {
        const wx = 140 + Math.floor(Math.random() * 20);
        if (getType(wx, 10) === EMPTY) setCell(wx, 10, WATER);
      }
    }
  },
  {
    id: 4,
    name: 'The Garden',
    objective: 'Use water to grow plants across the wall gap. Plants must fill the target zone on the right.',
    materials: [WATER],
    winZone: { x1: 220, y1: 55, x2: 260, y2: 75 },
    winType: PLANT,
    winCount: 30,
    setup(setCell) {
      // ground
      hLine(setCell, 40, 270, 170, WALL);
      // dividing wall — plants must grow up and over
      vLine(setCell, 200, 80, 170, WALL);
      // seed plants on left side along the ground
      for (let x = 60; x <= 180; x += 6) {
        setCell(x, 169, PLANT);
      }
    }
  },
  {
    id: 5,
    name: 'Oil Rig',
    objective: 'Ignite the oil reservoir to destroy the wooden supports. Let sand fall into the collection zone.',
    materials: [FIRE],
    winZone: { x1: 120, y1: 175, x2: 180, y2: 195 },
    winType: SAND,
    winCount: 80,
    setup(setCell) {
      // outer walls
      vLine(setCell, 100, 30, 195, WALL);
      vLine(setCell, 200, 30, 195, WALL);
      hLine(setCell, 100, 200, 195, WALL);
      // wooden support platform
      for (let x = 101; x <= 199; x++) {
        for (let y = 90; y <= 94; y++) setCell(x, y, WOOD);
      }
      // sand on top
      for (let x = 110; x <= 190; x++) {
        for (let y = 40; y <= 85; y++) {
          if (Math.random() < 0.85) setCell(x, y, SAND);
        }
      }
      // oil reservoir under the wood
      for (let x = 110; x <= 190; x++) {
        for (let y = 96; y <= 102; y++) {
          setCell(x, y, OIL);
        }
      }
      // second wooden layer
      for (let x = 101; x <= 199; x++) {
        for (let y = 104; y <= 107; y++) setCell(x, y, WOOD);
      }
      // target marker
      hLine(setCell, 118, 182, 175, WALL);
      for (let x = 130; x <= 170; x++) setCell(x, 175, EMPTY);
    }
  },
  {
    id: 6,
    name: 'The Flood',
    objective: 'Build a dam to protect the wood from rising water. Don\'t let the water touch the wood!',
    materials: [SAND, STONE],
    winType: null, // survival: wood must persist
    survivalTime: 2400, // frames to survive
    setup(setCell) {
      // ground
      hLine(setCell, 20, 280, 180, WALL);
      // wood to protect (right side)
      for (let x = 200; x <= 240; x++) {
        for (let y = 160; y <= 179; y++) {
          setCell(x, y, WOOD);
        }
      }
      this._woodCells = [];
      for (let x = 200; x <= 240; x++) {
        for (let y = 160; y <= 179; y++) this._woodCells.push([x, y]);
      }
      // walls on sides
      vLine(setCell, 20, 20, 180, WALL);
      vLine(setCell, 280, 20, 180, WALL);
    },
    tick(setCell, getType, tick) {
      // heavy water flow from left
      for (let i = 0; i < 3; i++) {
        const wx = 25 + Math.floor(Math.random() * 8);
        if (getType(wx, 20) === EMPTY) setCell(wx, 20, WATER);
      }
    },
    checkWin(getType, tick) {
      // fail if any water touches the wood
      for (const [x, y] of this._woodCells) {
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            if (getType(x + dx, y + dy) === WATER) return 'fail';
          }
        }
      }
      if (tick >= this.survivalTime) return 'win';
      return null;
    }
  },
  {
    id: 7,
    name: 'Powder Keg',
    objective: 'Use fire to ignite the gunpowder trail and blast through the stone barriers. Get the sand to the bottom!',
    materials: [FIRE],
    winZone: { x1: 130, y1: 175, x2: 170, y2: 195 },
    winType: SAND,
    winCount: 50,
    setup(setCell) {
      // outer frame — sealed box
      vLine(setCell, 90, 20, 195, WALL);
      vLine(setCell, 210, 20, 195, WALL);
      hLine(setCell, 90, 210, 195, WALL);
      hLine(setCell, 90, 210, 20, WALL);
      // sand at top (leave left column clear for fuse access)
      for (let x = 105; x <= 200; x++) {
        for (let y = 25; y <= 55; y++) {
          if (Math.random() < 0.9) setCell(x, y, SAND);
        }
      }
      // === FIRST BARRIER (y=58-66) — stone with gunpowder thread through middle ===
      // bottom stone (below the gunpowder so it can't fall)
      for (let x = 91; x <= 209; x++) {
        for (let y = 63; y <= 66; y++) setCell(x, y, STONE);
      }
      // gunpowder thread running through the barrier
      for (let x = 91; x <= 209; x++) {
        setCell(x, 62, GUNPOWDER);
      }
      // top stone (above the gunpowder)
      for (let x = 91; x <= 209; x++) {
        for (let y = 58; y <= 61; y++) setCell(x, y, STONE);
      }

      // === FUSE CHANNEL along left wall ===
      // inner channel wall keeps sand out, shelf supports gunpowder
      vLine(setCell, 93, 21, 57, WALL);
      hLine(setCell, 91, 92, 57, WALL);   // shelf
      // vertical fuse — exposed at top (y=30) for player to light
      for (let y = 30; y <= 56; y++) {
        setCell(91, y, GUNPOWDER);
        setCell(92, y, GUNPOWDER);
      }
      // fuse connects to barrier thread at y=62 (gunpowder already there at x=91)

      // === SECOND BARRIER (y=108-116) — same pattern ===
      for (let x = 91; x <= 209; x++) {
        for (let y = 113; y <= 116; y++) setCell(x, y, STONE);
      }
      for (let x = 91; x <= 209; x++) {
        setCell(x, 112, GUNPOWDER);
      }
      for (let x = 91; x <= 209; x++) {
        for (let y = 108; y <= 111; y++) setCell(x, y, STONE);
      }

      // lower fuse channel connecting barriers
      vLine(setCell, 93, 67, 107, WALL);
      hLine(setCell, 91, 92, 107, WALL);  // shelf
      for (let y = 67; y <= 106; y++) {
        setCell(91, y, GUNPOWDER);
        setCell(92, y, GUNPOWDER);
      }
      // fuse connects to second barrier thread at y=112 (gunpowder already at x=91)
    }
  },
  {
    id: 8,
    name: 'Breaching Charge',
    objective: 'Place C4 on the thick stone vault wall and ignite it with fire. Get the water to the basin below.',
    materials: [C4, FIRE],
    winZone: { x1: 125, y1: 160, x2: 175, y2: 190 },
    winType: WATER,
    winCount: 70,
    setup(setCell) {
      // outer frame
      vLine(setCell, 80, 10, 195, WALL);
      vLine(setCell, 220, 10, 195, WALL);
      hLine(setCell, 80, 220, 195, WALL);
      // water reservoir at top
      for (let x = 90; x <= 210; x++) {
        for (let y = 15; y <= 55; y++) {
          setCell(x, y, WATER);
        }
      }
      // thick stone vault wall
      for (let x = 81; x <= 219; x++) {
        for (let y = 58; y <= 78; y++) {
          setCell(x, y, STONE);
        }
      }
      // basin below
      vLine(setCell, 120, 130, 195, WALL);
      vLine(setCell, 180, 130, 195, WALL);
      hLine(setCell, 120, 180, 160, WALL);
      // gap in basin top for water entry
      for (let x = 135; x <= 165; x++) setCell(x, 160, EMPTY);
    }
  },
  {
    id: 9,
    name: 'Countdown',
    objective: 'Place dynamite on the wooden bridge, then click it to light the fuse. You have 5 seconds before it blows — get clear!',
    materials: [DYNAMITE],
    winZone: { x1: 130, y1: 175, x2: 170, y2: 195 },
    winType: SAND,
    winCount: 60,
    setup(setCell) {
      // outer frame
      vLine(setCell, 90, 20, 195, WALL);
      vLine(setCell, 210, 20, 195, WALL);
      hLine(setCell, 90, 210, 195, WALL);
      // sand reservoir at top
      for (let x = 100; x <= 200; x++) {
        for (let y = 25; y <= 70; y++) {
          if (Math.random() < 0.9) setCell(x, y, SAND);
        }
      }
      // wooden bridge — thick so it needs a real explosion
      for (let x = 91; x <= 209; x++) {
        for (let y = 75; y <= 88; y++) setCell(x, y, WOOD);
      }
    }
  },
  {
    id: 10,
    name: 'Chain Reaction',
    objective: 'Light one dynamite to trigger a chain of explosions across all three chambers. Fill every basin with sand.',
    materials: [DYNAMITE],
    winType: null,
    setup(setCell) {
      // ground
      hLine(setCell, 20, 280, 195, WALL);
      // three chambers
      const chambers = [
        { cx: 70,  left: 40,  right: 100 },
        { cx: 150, left: 120, right: 180 },
        { cx: 230, left: 200, right: 260 },
      ];
      chambers.forEach((ch) => {
        // walls — full height, no gaps
        vLine(setCell, ch.left, 20, 195, WALL);
        vLine(setCell, ch.right, 20, 195, WALL);
        // ceiling
        hLine(setCell, ch.left, ch.right, 20, WALL);
        // sand at top
        for (let x = ch.left + 1; x <= ch.right - 1; x++) {
          for (let y = 21; y <= 58; y++) {

// helper to draw lines in setup
function hLine(setCell, x1, x2, y, type) {

// ============================================================
//  ENGINE
// ============================================================
const COLS = 300, ROWS = 200, CELL = 3;
const WIDTH = COLS * CELL, HEIGHT = ROWS * CELL;

const canvas = document.getElementById('canvas');
canvas.width = WIDTH;
canvas.height = HEIGHT;
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(WIDTH, HEIGHT);
const pixels = imageData.data;

const grid = new Uint8Array(COLS * ROWS);
const colorR = new Uint8Array(COLS * ROWS);
const colorG = new Uint8Array(COLS * ROWS);
const colorB = new Uint8Array(COLS * ROWS);
const updated = new Uint8Array(COLS * ROWS);
const lifetime = new Int16Array(COLS * ROWS);
const fixed = new Uint8Array(COLS * ROWS); // 1 = placed by level setup, can't be erased/overwritten

let tick = 0;
let currentMode = null; // 'sandbox' | 'level'
let currentLevel = null;
let levelWon = false;
let levelFailed = false;
let animFrame = null;

// --- Color ---
function randInt(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

function colorFor(type) {
  switch (type) {
    case SAND:  return [randInt(190,220), randInt(150,175), randInt(55,85)];
    case WATER: return [randInt(50,80),   randInt(110,140), randInt(180,220)];
    case STONE: return [randInt(110,140), randInt(110,140), randInt(110,140)];
    case FIRE:  return [randInt(220,255), randInt(60,120),  randInt(10,40)];
    case WOOD:  return [randInt(120,150), randInt(75,100),  randInt(40,65)];
    case OIL:   return [randInt(50,70),   randInt(35,50),   randInt(20,35)];
    case SMOKE: return [randInt(80,120),  randInt(80,120),  randInt(80,120)];
    case ACID:  return [randInt(90,130),  randInt(230,255), randInt(0,30)];
    case PLANT: return [randInt(30,60),   randInt(120,160), randInt(30,60)];
    case WALL:  return [randInt(45,55),   randInt(45,55),   randInt(65,80)];
    case GUNPOWDER:     return [randInt(40,55),   randInt(40,55),   randInt(40,55)];
    case C4:            return [randInt(75,95),   randInt(100,120), randInt(45,60)];
    case DYNAMITE:      return [randInt(190,210), randInt(30,50),   randInt(20,35)];
    case GUNPOWDER_LIT: return [randInt(220,255), randInt(80,140),  randInt(20,40)];
    case C4_LIT:        return [randInt(120,150), randInt(160,190), randInt(60,80)];
    case DYNAMITE_LIT:  return [randInt(220,255), randInt(100,180), randInt(30,60)];
    case BLACKHOLE:     return [randInt(5,15),    randInt(0,8),     randInt(15,30)];
    case GAS:           return [randInt(120,160), randInt(200,230), randInt(120,160)];
    case LAVA:          return [randInt(200,255), randInt(50,100),  randInt(0,20)];
    case ICE:           return [randInt(170,200), randInt(220,240), randInt(240,255)];
    case STEAM:         return [randInt(190,210), randInt(200,220), randInt(210,230)];
    case METAL:         return [randInt(140,170), randInt(145,175), randInt(160,185)];
    case MUD:           return [randInt(90,110),  randInt(55,75),   randInt(30,45)];
    case GLASS:         return [randInt(200,220), randInt(225,240), randInt(240,255)];
    case VIRUS:         return [randInt(140,170), randInt(30,60),   randInt(180,210)];
    case CLONE:         return [randInt(230,255), randInt(90,120),  randInt(170,200)];
    case VOID:          return [randInt(0,5),     randInt(0,5),     randInt(0,5)];
    case WET_WOOD:      return [randInt(60,80),   randInt(40,55),   randInt(25,40)];
    case PORTAL_BLUE:   return [randInt(0,20),    randInt(80,120),  randInt(220,255)];
    case PORTAL_ORANGE: return [randInt(230,255), randInt(120,160), randInt(0,20)];
    case HOPPER:        return [randInt(200,230), randInt(50,80),   randInt(110,140)];
    case HOPPER_FIRE:   return [randInt(220,255), randInt(80,130),  randInt(20,50)];
    case FUSE:          return [randInt(130,150), randInt(100,115), randInt(20,35)];
    case FUSE_LIT:      return [randInt(220,255), randInt(100,160), randInt(10,40)];
    case NITRO:         return [randInt(0,20),    randInt(190,220), randInt(200,230)];
    case NITRO_LIT:     return [randInt(100,180), randInt(220,255), randInt(220,255)];
    case FIREWORK:      return [randInt(200,230), randInt(20,60),   randInt(100,140)];
    case FIREWORK_LIT:  return [randInt(255,255), randInt(200,255), randInt(50,100)];
    default:    return [0, 0, 0];
  }
}

// --- Grid helpers ---
function idx(x, y) { return y * COLS + x; }
function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }
function isEmpty(x, y) { return inBounds(x, y) && grid[idx(x, y)] === EMPTY; }
function getType(x, y) { return inBounds(x, y) ? grid[idx(x, y)] : -1; }

function setCell(x, y, type, isFixed) {
  if (!inBounds(x, y)) return;
  const i = idx(x, y);
  grid[i] = type;
  if (isFixed) fixed[i] = 1;
  if (type === EMPTY) {
    colorR[i] = 0; colorG[i] = 0; colorB[i] = 0;
    lifetime[i] = 0;
    if (isFixed === undefined) fixed[i] = 0;
  } else {
    const [r, g, b] = colorFor(type);
    colorR[i] = r; colorG[i] = g; colorB[i] = b;
    if (type === SMOKE) lifetime[i] = randInt(60, 150);
    else if (type === FIRE) lifetime[i] = randInt(30, 90);
    else if (type === GUNPOWDER_LIT) lifetime[i] = randInt(20, 40);
    else if (type === C4_LIT) lifetime[i] = randInt(35, 55);
    else if (type === DYNAMITE_LIT) lifetime[i] = 300;
    else if (type === STEAM) lifetime[i] = randInt(120, 250);
    else if (type === MUD) lifetime[i] = randInt(500, 800); // drying time
    else if (type === WET_WOOD) lifetime[i] = randInt(900, 1500); // drying time
    else if (type === FUSE_LIT) lifetime[i] = randInt(8, 15);
    else if (type === NITRO_LIT) lifetime[i] = randInt(35, 55);
    else if (type === FIREWORK_LIT) lifetime[i] = randInt(60, 110); // flight time
    else if (type === HOPPER) lifetime[i] = Math.random() < 0.5 ? 1 : -1; // direction
    else if (type === HOPPER_FIRE) lifetime[i] = randInt(90, 150); // burn time
    else lifetime[i] = 0;
  }
}

function swap(x1, y1, x2, y2) {
  const i1 = idx(x1, y1), i2 = idx(x2, y2);
  let tmp;
  tmp = grid[i1]; grid[i1] = grid[i2]; grid[i2] = tmp;
  tmp = colorR[i1]; colorR[i1] = colorR[i2]; colorR[i2] = tmp;
  tmp = colorG[i1]; colorG[i1] = colorG[i2]; colorG[i2] = tmp;
  tmp = colorB[i1]; colorB[i1] = colorB[i2]; colorB[i2] = tmp;
  tmp = lifetime[i1]; lifetime[i1] = lifetime[i2]; lifetime[i2] = tmp;
  tmp = updated[i1]; updated[i1] = updated[i2]; updated[i2] = tmp;
  tmp = fixed[i1]; fixed[i1] = fixed[i2]; fixed[i2] = tmp;
}

function clearGrid() {
  grid.fill(0); colorR.fill(0); colorG.fill(0); colorB.fill(0);
  lifetime.fill(0); updated.fill(0); fixed.fill(0);
  tick = 0;
  portalBluePos = null; portalOrangePos = null; nextPortalIsBlue = true;
}

// ============================================================
//  SIMULATION
// ============================================================
function updateSand(x, y) {
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  const below = getType(x, y + 1);
  if (below === WATER || below === OIL) { swap(x, y, x, y + 1); return; }
}

function updateWater(x, y) {
  // water + lava = steam + stone (handled in lava too but catch both sides)
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const t = getType(x + dx, y + dy);
      if (t === LAVA) { setCell(x, y, STEAM); setCell(x + dx, y + dy, STONE); return; }
      if (t === WOOD && Math.random() < 0.03) {
        setCell(x + dx, y + dy, WET_WOOD);
        setCell(x, y, EMPTY); // water gets absorbed
        return;
      }
    }
  }
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  if (getType(x, y + 1) === OIL) { swap(x, y, x, y + 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
  // water + sand = mud (rare, when water is sitting on sand)
  if (getType(x, y + 1) === SAND && Math.random() < 0.004) {
    setCell(x, y, EMPTY);
    setCell(x, y + 1, MUD);
  }
}

function updateOil(x, y) {
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
}

function updateFire(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  colorR[i] = randInt(200, 255);
  colorG[i] = randInt(40, 140);
  colorB[i] = randInt(5, 30);
  if (lifetime[i] <= 0) {
    if (Math.random() < 0.4) setCell(x, y, SMOKE);
    else { grid[i] = EMPTY; colorR[i] = 0; colorG[i] = 0; colorB[i] = 0; }
    return;
  }
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      const t = getType(nx, ny);
      if ((t === WOOD || t === OIL || t === PLANT) && Math.random() < (t === OIL ? 0.15 : 0.03)) {
        setCell(nx, ny, FIRE);
      }
      // fire slowly dries wet wood back to normal wood
      if (t === WET_WOOD && Math.random() < 0.06) {
        setCell(nx, ny, WOOD);
      }
      if (t === GUNPOWDER) setCell(nx, ny, GUNPOWDER_LIT);
      if (t === C4) setCell(nx, ny, C4_LIT);
      if (t === DYNAMITE) setCell(nx, ny, DYNAMITE_LIT);
      if (t === FUSE) setCell(nx, ny, FUSE_LIT);
      if (t === NITRO) setCell(nx, ny, NITRO_LIT);
      if (t === FIREWORK) setCell(nx, ny, FIREWORK_LIT);
    }
  }
  if (isEmpty(x, y - 1) && Math.random() < 0.3) swap(x, y, x, y - 1);
}

function updateSmoke(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  const fade = Math.max(0, Math.min(1, lifetime[i] / 60));
  colorR[i] = Math.floor(100 * fade);
  colorG[i] = Math.floor(100 * fade);
  colorB[i] = Math.floor(100 * fade);
  if (lifetime[i] <= 0) {
    grid[i] = EMPTY; colorR[i] = 0; colorG[i] = 0; colorB[i] = 0;
    return;
  }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x, y - 1)) { swap(x, y, x, y - 1); return; }
  if (isEmpty(x + dir, y - 1)) { swap(x, y, x + dir, y - 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
}

function updateAcid(x, y) {
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      const t = getType(nx, ny);
      // acid cannot dissolve WALL
      if (t > 0 && t !== ACID && t !== EMPTY && t !== WALL && t !== BLACKHOLE && t !== VOID && t !== CLONE && t !== METAL && t !== PORTAL_BLUE && t !== PORTAL_ORANGE && Math.random() < 0.04) {
        setCell(nx, ny, EMPTY);
        if (Math.random() < 0.3) { setCell(x, y, SMOKE); return; }
        if (Math.random() < 0.15) { setCell(x, y, EMPTY); return; }
      }
    }
  }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
}

function updatePlant(x, y) {
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      if (getType(nx, ny) === WATER && Math.random() < 0.008) {
        setCell(nx, ny, PLANT);
      }
    }
  }
}

function explosionBlocked(cx, cy, tx, ty) {
  // ray march from center to target, check if metal blocks the path
  const dx = tx - cx, dy = ty - cy;
  const steps = Math.max(Math.abs(dx), Math.abs(dy));
  if (steps === 0) return false;
  for (let s = 1; s < steps; s++) {
    const mx = cx + Math.round(dx * s / steps);
    const my = cy + Math.round(dy * s / steps);
    const mt = getType(mx, my);
    if (mt === METAL) return true;
  }
  return false;
}

function explode(cx, cy, radius) {
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > radius) continue;
      const nx = cx + dx, ny = cy + dy;
      if (!inBounds(nx, ny)) continue;
      const t = getType(nx, ny);
      if (t === WALL || t === PORTAL_BLUE || t === PORTAL_ORANGE) continue; // indestructible
      // metal absorbs blast — only destroyed at close range, blocks everything behind
      if (t === METAL) {
        if (dist < radius * 0.3) setCell(nx, ny, EMPTY);
        continue;
      }
      // check if metal blocks the path from center to this cell
      if (explosionBlocked(cx, cy, nx, ny)) continue;
      // chain reaction — light other explosives
      if (t === GUNPOWDER) { setCell(nx, ny, GUNPOWDER_LIT); continue; }
      if (t === C4) { setCell(nx, ny, C4_LIT); continue; }
      if (t === DYNAMITE) { setCell(nx, ny, DYNAMITE_LIT); continue; }
      if (t === HOPPER) { setCell(nx, ny, HOPPER_FIRE); continue; }
      if (t === FUSE) { setCell(nx, ny, FUSE_LIT); continue; }
      if (t === NITRO) { setCell(nx, ny, NITRO_LIT); continue; }
      if (t === FIREWORK) { setCell(nx, ny, FIREWORK_LIT); continue; }
      if (t === EMPTY) {
        // fire ring at the edge
        if (dist > radius * 0.6 && Math.random() < 0.4) setCell(nx, ny, FIRE);
      } else {
        // destroy everything in blast, with some fire/smoke
        if (Math.random() < 0.3) setCell(nx, ny, FIRE);
        else if (Math.random() < 0.3) setCell(nx, ny, SMOKE);
        else setCell(nx, ny, EMPTY);
      }
    }
  }
}

function updateGunpowder(x, y) {
  // gravity — falls like sand
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
}

  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }

  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }

}

function updateDynamite(x, y) {

function updateDynamiteLit(x, y) {

  // flicker — intensity increases as fuse runs down
  const urgency = 1 - (lifetime[i] / 300);
  colorR[i] = randInt(180, 255);
  colorG[i] = randInt(Math.floor(40 + 80 * (1 - urgency)), Math.floor(80 + 100 * (1 - urgency)));

  // gravity still applies
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }

  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  if (lifetime[i] <= 0) { explode(x, y, 18); }
}

// firework is static — stays where placed until clicked/lit

function fireworkExplode(cx, cy) {
  // colorful starburst — pick a random color palette
  const palettes = [
    [[255,50,50],[255,150,50],[255,255,100]],    // red/orange
    [[50,100,255],[100,200,255],[200,230,255]],   // blue
    [[50,255,50],[150,255,100],[255,255,50]],     // green/yellow
    [[255,50,200],[255,150,255],[200,100,255]],   // pink/purple
    [[255,200,50],[255,255,150],[255,100,50]],    // gold
  ];
  const pal = palettes[Math.floor(Math.random() * palettes.length)];
  const radius = randInt(8, 14);
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > radius) continue;
      // sparse starburst pattern
      if (Math.random() > 0.3) continue;
      const nx = cx + dx, ny = cy + dy;
      if (!inBounds(nx, ny)) continue;
      if (!isEmpty(nx, ny) && getType(nx, ny) !== FIREWORK_LIT) continue;
      const col = pal[Math.floor(Math.random() * pal.length)];
      setCell(nx, ny, FIRE);
      const fi = idx(nx, ny);
      colorR[fi] = col[0]; colorG[fi] = col[1]; colorB[fi] = col[2];
      lifetime[fi] = randInt(15, 40);
    }
  }
}

function updateFireworkLit(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  // trail sparks
  colorR[i] = randInt(255, 255);
  colorG[i] = randInt(200, 255);
  colorB[i] = randInt(50, 120);
  // leave a spark trail
  if (Math.random() < 0.5) {
    const trailY = y + 1;
    if (isEmpty(x, trailY)) {
      setCell(x, trailY, FIRE);
      lifetime[idx(x, trailY)] = randInt(5, 15);
    }
  }
  if (lifetime[i] <= 0) {
    fireworkExplode(x, y);
    return;
  }
  // fly upward with random drift — only explodes from timer
  const drift = Math.random() < 0.3 ? (Math.random() < 0.5 ? -1 : 1) : 0;
  const nx = x + drift, ny = y - 1;
  if (isEmpty(nx, ny)) {
    swap(x, y, nx, ny);
  } else if (isEmpty(x, ny)) {
    swap(x, y, x, ny);
  }
  // if blocked, just wait — will explode when timer runs out
}

function updateNitroLit(x, y) {

  lifetime[i]--;
  colorR[i] = randInt(80, 180);
  colorG[i] = randInt(220, 255);
  colorB[i] = randInt(220, 255);

}

function updateWetWood(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  // dry out over time — returns to normal flammable wood
  if (lifetime[i] <= 0) {
    setCell(x, y, WOOD);
    return;
  }
}

function updateGas(x, y) {
  // check for fire neighbors — explode!
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      if (getType(x + dx, y + dy) === FIRE) {
        explode(x, y, 10);
        return;
      }
    }
  }
  // rise and drift like smoke
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x, y - 1)) { swap(x, y, x, y - 1); return; }
  if (isEmpty(x + dir, y - 1)) { swap(x, y, x + dir, y - 1); return; }
  if (isEmpty(x - dir, y - 1)) { swap(x, y, x - dir, y - 1); return; }
  // spread sideways
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
  // slowly sink if trapped (heavier than air but lighter than liquids)
  if (isEmpty(x, y + 1) && Math.random() < 0.05) { swap(x, y, x, y + 1); return; }
}

function updateLava(x, y) {
  const i = idx(x, y);
  // flicker
  colorR[i] = randInt(200, 255);
  colorG[i] = randInt(40, 100);
  colorB[i] = randInt(0, 20);
  // interactions with neighbors
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      const t = getType(nx, ny);
      // water + lava = stone + steam
      if (t === WATER) {
        setCell(nx, ny, STEAM);
        setCell(x, y, STONE);
        return;
      }
      // ice + lava = water + stone
      if (t === ICE) {
        setCell(nx, ny, WATER);
        setCell(x, y, STONE);
        return;
      }
      // lava turns sand to glass
      if (t === SAND && Math.random() < 0.5) {
        setCell(nx, ny, GLASS);
      }
      // ignite flammables
      if ((t === WOOD || t === OIL || t === PLANT) && Math.random() < 0.1) {
        setCell(nx, ny, FIRE);
      }
      if (t === WET_WOOD && Math.random() < 0.06) {
        setCell(nx, ny, WOOD);
      }
      if (t === GUNPOWDER) setCell(nx, ny, GUNPOWDER_LIT);
      if (t === C4) setCell(nx, ny, C4_LIT);
      if (t === DYNAMITE) setCell(nx, ny, DYNAMITE_LIT);
      if (t === NITRO) setCell(nx, ny, NITRO_LIT);
      if (t === FUSE) setCell(nx, ny, FUSE_LIT);
      if (t === GAS) { explode(nx, ny, 10); return; }
    }
  }
  // flow like slow water
  if (Math.random() < 0.4) return; // slower than water
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
}

function updateIce(x, y) {
  // melt near fire or lava
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const t = getType(x + dx, y + dy);
      if ((t === FIRE || t === LAVA) && Math.random() < 0.08) {
        setCell(x, y, WATER);
        return;
      }
    }
  }
  // freeze adjacent water
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      if (getType(x + dx, y + dy) === WATER && Math.random() < 0.003) {
        setCell(x + dx, y + dy, ICE);
      }
    }
  }
}

function updateSteam(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  const fade = Math.max(0, Math.min(1, lifetime[i] / 80));
  colorR[i] = Math.floor(200 * fade + 18 * (1 - fade));
  colorG[i] = Math.floor(210 * fade + 18 * (1 - fade));
  colorB[i] = Math.floor(220 * fade + 28 * (1 - fade));
  // condense back to water
  if (lifetime[i] <= 0) {
    setCell(x, y, WATER);
    return;
  }
  // rise fast
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x, y - 1)) { swap(x, y, x, y - 1); return; }
  if (isEmpty(x + dir, y - 1)) { swap(x, y, x + dir, y - 1); return; }
  if (isEmpty(x - dir, y - 1)) { swap(x, y, x - dir, y - 1); return; }
  if (isEmpty(x + dir, y)) { swap(x, y, x + dir, y); return; }
  if (isEmpty(x - dir, y)) { swap(x, y, x - dir, y); return; }
}

function updateMetal(x, y) {
  // heavy — falls straight down, sinks through sand, water, oil
  const below = getType(x, y + 1);
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  if (below === WATER || below === OIL || below === SAND) { swap(x, y, x, y + 1); return; }
  // no diagonal fall — metal stacks into towers
  // conduct fire — if a neighbor is fire, spread fire to another neighbor
  let hasFire = false;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (getType(x + dx, y + dy) === FIRE) hasFire = true;
    }
  }
  if (hasFire && Math.random() < 0.05) {
    const dx = randInt(-1, 1), dy = randInt(-1, 1);
    const t = getType(x + dx, y + dy);
    if (t === WOOD || t === OIL || t === PLANT) setCell(x + dx, y + dy, FIRE);
  }
}

function updateMud(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  // dry into stone
  if (lifetime[i] <= 0) {
    setCell(x, y, STONE);
    return;
  }
  // fall slowly
  if (Math.random() < 0.3) return;
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y + 1)) { swap(x, y, x + dir, y + 1); return; }
  if (isEmpty(x - dir, y + 1)) { swap(x, y, x - dir, y + 1); return; }
}

function updateVirus(x, y) {
  const i = idx(x, y);
  // pulsing color
  const pulse = Math.sin(tick * 0.15 + x * 0.5 + y * 0.5);
  colorR[i] = Math.floor(155 + pulse * 30);
  colorG[i] = Math.floor(45 + pulse * 15);
  colorB[i] = Math.floor(195 + pulse * 20);
  // spread to adjacent non-empty, non-indestructible cells
  if (Math.random() < 0.02) {
    const dx = randInt(-1, 1), dy = randInt(-1, 1);
    if (dx === 0 && dy === 0) return;
    const nx = x + dx, ny = y + dy;
    const t = getType(nx, ny);
    if (t > 0 && t !== VIRUS && t !== WALL && t !== BLACKHOLE && t !== VOID && t !== CLONE) {
      setCell(nx, ny, VIRUS);
    }
  }
  // virus slowly dies
  if (Math.random() < 0.002) {
    setCell(x, y, EMPTY);
  }
}

function updateClone(x, y) {
  // detect what material is touching any surface
  let sourceType = 0;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const t = getType(x + dx, y + dy);
      if (t > 0 && t !== CLONE && t !== WALL && t !== VOID && t !== BLACKHOLE) {
        sourceType = t;
        break;
      }
    }
    if (sourceType) break;
  }
  if (!sourceType) return;
  // expel clones of that material from all empty adjacent cells
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      if (isEmpty(x + dx, y + dy)) {
        setCell(x + dx, y + dy, sourceType);
      }
    }
  }
}

function updatePortal(x, y, partnerPos) {
  const i = idx(x, y);
  const isBlue = grid[i] === PORTAL_BLUE;
  // pulsing glow
  const t = tick * 0.12 + x * 0.2 + y * 0.2;
  if (isBlue) {
    colorR[i] = Math.floor(10 + Math.sin(t) * 10);
    colorG[i] = Math.floor(100 + Math.sin(t * 1.3) * 30);
    colorB[i] = Math.floor(230 + Math.sin(t * 0.8) * 25);
  } else {
    colorR[i] = Math.floor(240 + Math.sin(t) * 15);
    colorG[i] = Math.floor(140 + Math.sin(t * 1.3) * 30);
    colorB[i] = Math.floor(10 + Math.sin(t * 0.8) * 10);
  }
  if (!partnerPos) return;
  // teleport adjacent particles to the partner
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      const nt = getType(nx, ny);
      if (nt <= 0 || nt === WALL || nt === PORTAL_BLUE || nt === PORTAL_ORANGE || nt === VOID || nt === BLACKHOLE || nt === CLONE) continue;
      // try mirror position first, then fallback positions
      const targets = [
        { tx: partnerPos.x + dx, ty: partnerPos.y + dy },
        { tx: partnerPos.x, ty: partnerPos.y + 1 },      // below partner
        { tx: partnerPos.x, ty: partnerPos.y - 1 },      // above partner
        { tx: partnerPos.x + 1, ty: partnerPos.y },      // right of partner
        { tx: partnerPos.x - 1, ty: partnerPos.y },      // left of partner
      ];
      for (const { tx, ty } of targets) {
        if (isEmpty(tx, ty)) {
          const si = idx(nx, ny), di = idx(tx, ty);
          grid[di] = grid[si]; colorR[di] = colorR[si]; colorG[di] = colorG[si]; colorB[di] = colorB[si];
          lifetime[di] = lifetime[si]; fixed[di] = 0;
          grid[si] = EMPTY; colorR[si] = 0; colorG[si] = 0; colorB[si] = 0;
          lifetime[si] = 0; fixed[si] = 0;
          break;
        }
      }
    }
  }
}

function updateHopper(x, y) {
  const i = idx(x, y);
  const dir = lifetime[i] >= 1 ? 1 : -1;

  // animate color — little bouncing blob
  const bounce = Math.sin(tick * 0.3 + x * 0.5);
  colorR[i] = Math.floor(215 + bounce * 20);
  colorG[i] = Math.floor(65 + bounce * 15);
  colorB[i] = Math.floor(125 + bounce * 15);

  // catch fire from adjacent fire or explosions
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const t = getType(x + dx, y + dy);
      if (t === FIRE || t === LAVA) {
        setCell(x, y, HOPPER_FIRE);
        return;
      }
    }
  }

  // drown only if submerged 5 deep — liquid above for 5 consecutive cells
  let submerged = 0;
  for (let h = 1; h <= 5; h++) {
    const t = getType(x, y - h);
    if (t === WATER || t === LAVA || t === ACID) submerged++;
    else break;
  }
  if (submerged >= 5) {
    setCell(x, y, EMPTY);
    return;
  }

  // gravity — fall straight down, sink through liquids
  const belowType = getType(x, y + 1);
  if (isEmpty(x, y + 1)) {
    swap(x, y, x, y + 1);
    return;
  }
  if (belowType === WATER || belowType === OIL) {
    swap(x, y, x, y + 1);
    return;
  }
  if (belowType === LAVA || belowType === ACID) {
    setCell(x, y, FIRE);
    return;
  }

  // on solid ground — walk
  if (Math.random() < 0.3) return; // slow down a bit

  const nx = x + dir;
  // pass through other hoppers — swap positions
  if (inBounds(nx, y) && getType(nx, y) === HOPPER) {
    swap(x, y, nx, y);
    return;
  }
  if (isEmpty(nx, y) && !isEmpty(nx, y + 1)) {
    // can walk forward and there's ground ahead
    swap(x, y, nx, y);
  } else if (isEmpty(nx, y) && isEmpty(nx, y + 1)) {
    // gap ahead — walk and fall
    swap(x, y, nx, y);
  } else if (!isEmpty(nx, y)) {
    // blocked — try to step/jump up (up to 3 pixels)
    let jumped = false;
    for (let jumpH = 1; jumpH <= 5; jumpH++) {
      // check destination is clear
      if (!isEmpty(nx, y - jumpH)) continue;
      // check all cells above hopper are clear (room to jump)
      let clear = true;
      for (let h = 1; h <= jumpH; h++) {
        if (!isEmpty(x, y - h)) { clear = false; break; }
      }
      if (clear) {
        swap(x, y, nx, y - jumpH);
        jumped = true;
        break;
      }
    }
    if (!jumped) {
      lifetime[i] = -dir;
    }
  }
}

function updateFuseLit(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  // flicker
  colorR[i] = randInt(220, 255);
  colorG[i] = randInt(80, 160);
  colorB[i] = randInt(10, 40);
  if (lifetime[i] <= 0) {
    // burn out — spread fire to adjacent fuse and explosives
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx, ny = y + dy;
        const t = getType(nx, ny);
        if (t === FUSE) setCell(nx, ny, FUSE_LIT);
        if (t === GUNPOWDER) setCell(nx, ny, GUNPOWDER_LIT);
        if (t === C4) setCell(nx, ny, C4_LIT);
        if (t === DYNAMITE) setCell(nx, ny, DYNAMITE_LIT);
        if (t === NITRO) setCell(nx, ny, NITRO_LIT);
        if (t === FIREWORK) setCell(nx, ny, FIREWORK_LIT);
        if (t === WOOD || t === OIL || t === PLANT) setCell(nx, ny, FIRE);
        if (t === HOPPER) setCell(nx, ny, HOPPER_FIRE);
        if (t === GAS) { explode(nx, ny, 10); }
      }
    }
    setCell(x, y, FIRE);
  }
}

function updateHopperFire(x, y) {
  const i = idx(x, y);
  lifetime[i]--;
  // flicker
  colorR[i] = randInt(200, 255);
  colorG[i] = randInt(60, 140);
  colorB[i] = randInt(10, 40);
  if (lifetime[i] <= 0) {
    // die — leave a puff of smoke
    if (Math.random() < 0.5) setCell(x, y, SMOKE);
    else setCell(x, y, EMPTY);
    return;
  }
  // still falls
  if (isEmpty(x, y + 1)) { swap(x, y, x, y + 1); return; }
  // wander erratically while burning
  const dir = Math.random() < 0.5 ? -1 : 1;
  if (isEmpty(x + dir, y)) swap(x, y, x + dir, y);
}

function updateVoid(x, y) {
  const i = idx(x, y);
  // subtle dark shimmer
  colorR[i] = Math.floor(3 + Math.sin(tick * 0.08 + x) * 3);
  colorG[i] = Math.floor(3 + Math.sin(tick * 0.1 + y) * 3);
  colorB[i] = Math.floor(3 + Math.sin(tick * 0.12 + x + y) * 3);
  // delete anything touching it
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      const t = getType(nx, ny);
      if (t > 0 && t !== WALL && t !== VOID && t !== BLACKHOLE && t !== CLONE) {
        setCell(nx, ny, EMPTY);
      }
    }
  }
}

function updateBlackHole(x, y) {
  const i = idx(x, y);
  // swirling color
  const t = tick * 0.1 + x * 0.3 + y * 0.3;
  colorR[i] = Math.floor(10 + Math.sin(t) * 8);
  colorG[i] = Math.floor(5 + Math.sin(t * 1.3) * 5);
  colorB[i] = Math.floor(20 + Math.sin(t * 0.7) * 15);

  const radius = 50;
  // pull particles inward and consume adjacent ones
  for (let dx = -radius; dx <= radius; dx++) {
    for (let dy = -radius; dy <= radius; dy++) {
      if (dx === 0 && dy === 0) continue;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > radius) continue;
      const nx = x + dx, ny = y + dy;
      const t = getType(nx, ny);
      if (t <= 0 || t === WALL || t === BLACKHOLE || t === PORTAL_BLUE || t === PORTAL_ORANGE) continue;

      // consume anything directly adjacent
      if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) {
        setCell(nx, ny, EMPTY);
        continue;
      }

      // pull toward center — closer = stronger pull
      const pull = Math.random() < (1.5 / dist) ? 1 : 0;
      if (!pull) continue;

      const stepX = dx > 0 ? -1 : dx < 0 ? 1 : 0;
      const stepY = dy > 0 ? -1 : dy < 0 ? 1 : 0;
      const tx = nx + stepX, ty = ny + stepY;
      if (isEmpty(tx, ty)) {
        swap(nx, ny, tx, ty);
      }
    }
  }
}

function simulate() {
  tick++;
  const parity = tick & 1;
  const startX = parity ? 0 : COLS - 1;
  const endX = parity ? COLS : -1;
  const stepX = parity ? 1 : -1;

  for (let y = ROWS - 1; y >= 0; y--) {
    for (let x = startX; x !== endX; x += stepX) {
      const i = idx(x, y);
      if (updated[i] === parity) continue;
      updated[i] = parity;
      switch (grid[i]) {
        case SAND:  updateSand(x, y); break;
        case WATER: updateWater(x, y); break;
        case OIL:   updateOil(x, y); break;
        case FIRE:  updateFire(x, y); break;
        case SMOKE: updateSmoke(x, y); break;
        case ACID:  updateAcid(x, y); break;
        case PLANT: updatePlant(x, y); break;
        case GUNPOWDER:     updateGunpowder(x, y); break;
        case GUNPOWDER_LIT: updateGunpowderLit(x, y); break;
        case C4_LIT:        updateC4Lit(x, y); break;
        case DYNAMITE:      updateDynamite(x, y); break;
        case DYNAMITE_LIT:  updateDynamiteLit(x, y); break;
        case BLACKHOLE:     updateBlackHole(x, y); break;
        case GAS:           updateGas(x, y); break;
        case LAVA:          updateLava(x, y); break;
        case ICE:           updateIce(x, y); break;
        case STEAM:         updateSteam(x, y); break;
        case METAL:         updateMetal(x, y); break;
        case MUD:           updateMud(x, y); break;
        case VIRUS:         updateVirus(x, y); break;
        case CLONE:         updateClone(x, y); break;
        case VOID:          updateVoid(x, y); break;
        case WET_WOOD:      updateWetWood(x, y); break;
        case PORTAL_BLUE:   updatePortal(x, y, portalOrangePos); break;
        case PORTAL_ORANGE: updatePortal(x, y, portalBluePos); break;
        case HOPPER:        updateHopper(x, y); break;
        case HOPPER_FIRE:   updateHopperFire(x, y); break;
        case FUSE_LIT:      updateFuseLit(x, y); break;
        case NITRO_LIT:     updateNitroLit(x, y); break;
        case FIREWORK_LIT:  updateFireworkLit(x, y); break;
        // FIREWORK: static until lit
        // WALL, STONE, C4, FUSE, NITRO, GLASS: static, do nothing
      }
    }
  }
}

// ============================================================
//  RENDERING
// ============================================================
function render() {
  const bg = 18;
  const level = currentLevel;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const i = idx(x, y);
      let r, g, b;
      if (grid[i] === EMPTY) {
        // highlight win zone in level mode
        if (level && level.winZone &&
            x >= level.winZone.x1 && x <= level.winZone.x2 &&
            y >= level.winZone.y1 && y <= level.winZone.y2) {
          // subtle pulsing target zone
          const pulse = Math.sin(tick * 0.05) * 8 + 8;
          r = bg + pulse; g = bg + pulse * 0.6; b = bg;
        } else {
          r = bg; g = bg; b = bg + 10;
        }
      } else {
        r = colorR[i]; g = colorG[i]; b = colorB[i];
      }
      for (let cy = 0; cy < CELL; cy++) {
        for (let cx = 0; cx < CELL; cx++) {
          const pi = ((y * CELL + cy) * WIDTH + (x * CELL + cx)) * 4;
          pixels[pi] = r; pixels[pi+1] = g; pixels[pi+2] = b; pixels[pi+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

// ============================================================
//  INPUT
// ============================================================
let mouseDown = false, mouseX = 0, mouseY = 0;
// portal state
let nextPortalIsBlue = true;
let portalBluePos = null;  // {x, y}
let portalOrangePos = null;
let selected = SAND, brushSize = 3;
let availableMaterials = ALL_MATERIALS;

function getCellPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = WIDTH / rect.width, scaleY = HEIGHT / rect.height;
  return [
    Math.floor((e.clientX - rect.left) * scaleX / CELL),
    Math.floor((e.clientY - rect.top) * scaleY / CELL)
  ];
}

canvas.addEventListener('mousedown', (e) => { mouseDown = true; [mouseX, mouseY] = getCellPos(e); });
canvas.addEventListener('mousemove', (e) => { [mouseX, mouseY] = getCellPos(e); });
canvas.addEventListener('mouseup', () => { mouseDown = false; portalPlacedThisClick = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; portalPlacedThisClick = false; });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); mouseDown = true; [mouseX, mouseY] = getCellPos(e.touches[0]); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); [mouseX, mouseY] = getCellPos(e.touches[0]); });
canvas.addEventListener('touchend', () => { mouseDown = false; portalPlacedThisClick = false; });

let portalPlacedThisClick = false;

function placeMaterial() {
  if (!mouseDown) return;

  // portal placement — single click, places a 1x5 vertical strip
  if (selected === PORTAL) {
    if (portalPlacedThisClick) return;
    const px = mouseX, py = mouseY;
    if (!inBounds(px, py)) return;
    const portalW = 10;
    const halfW = Math.floor(portalW / 2);
    const type = nextPortalIsBlue ? PORTAL_BLUE : PORTAL_ORANGE;
    const oldPos = nextPortalIsBlue ? portalBluePos : portalOrangePos;
    // remove old portal
    if (oldPos) {
      for (let dx = -halfW; dx <= halfW; dx++) {
        if (inBounds(oldPos.x + dx, oldPos.y) && (getType(oldPos.x + dx, oldPos.y) === PORTAL_BLUE || getType(oldPos.x + dx, oldPos.y) === PORTAL_ORANGE)) {
          setCell(oldPos.x + dx, oldPos.y, EMPTY);
        }
      }
    }
    // place new portal
    for (let dx = -halfW; dx <= halfW; dx++) {
      if (inBounds(px + dx, py)) setCell(px + dx, py, type);
    }
    if (nextPortalIsBlue) {
      portalBluePos = { x: px, y: py };
      nextPortalIsBlue = false;
    } else {
      portalOrangePos = { x: px, y: py };
      nextPortalIsBlue = true;
    }
    portalPlacedThisClick = true;
    return;
  }

  const half = Math.floor(brushSize / 2);
  for (let dx = -half; dx <= half; dx++) {
    for (let dy = -half; dy <= half; dy++) {
      const px = mouseX + dx, py = mouseY + dy;
      if (!inBounds(px, py)) continue;
      if (dx * dx + dy * dy > half * half + 1) continue;
      const i = idx(px, py);
      // clicking on dynamite lights it
      if (grid[i] === DYNAMITE) {
        setCell(px, py, DYNAMITE_LIT);
        continue;
      }
      if (grid[i] === FIREWORK) {
        setCell(px, py, FIREWORK_LIT);
        continue;
      }
      // erasing a portal — clean up tracking
      if (selected === EMPTY) {
        if (grid[i] === PORTAL_BLUE) { portalBluePos = null; nextPortalIsBlue = true; }
        if (grid[i] === PORTAL_ORANGE) { portalOrangePos = null; }
      }
      // can't overwrite fixed cells (level geometry)
      if (fixed[i] && selected !== EMPTY) continue;
      // can't erase fixed cells either
      if (fixed[i] && selected === EMPTY) continue;
      if (selected === EMPTY) {
        setCell(px, py, EMPTY);
      } else if (isEmpty(px, py)) {
        setCell(px, py, selected);
      }
    }
  }
}

// ============================================================
//  UI WIRING
// ============================================================
const toolbar = document.getElementById('toolbar');
const brushSlider = document.getElementById('brush-size');
const brushVal = document.getElementById('brush-val');

function buildToolbar(mats) {
  toolbar.innerHTML = '';
  // eraser
  const eb = document.createElement('button');
  eb.className = 'mat-btn';
  eb.textContent = 'Eraser (0)';
  eb.style.background = '#333';
  eb.dataset.id = '0';
  eb.onclick = () => { selected = EMPTY; updateActiveBtn(); };
  toolbar.appendChild(eb);

  mats.forEach((mat) => {
    const btn = document.createElement('button');
    btn.className = 'mat-btn';
    btn.textContent = `${mat.name} (${mat.key})`;
    btn.style.background = mat.bg;
    btn.dataset.id = String(mat.id);
    btn.onclick = () => { selected = mat.id; updateActiveBtn(); };
    toolbar.appendChild(btn);
  });
  updateActiveBtn();
}

function updateActiveBtn() {
  document.querySelectorAll('.mat-btn').forEach(btn => {
    const id = parseInt(btn.dataset.id);
    btn.classList.toggle('active', id === selected);
  });
}

brushSlider.addEventListener('input', () => {
  brushSize = parseInt(brushSlider.value);
  brushVal.textContent = brushSize;
});

document.addEventListener('keydown', (e) => {
  if (currentMode === null) return;
  if (e.key === '0') { selected = EMPTY; updateActiveBtn(); return; }
  const mat = availableMaterials.find(m => m.key === e.key);
  if (mat) { selected = mat.id; updateActiveBtn(); }
});

// clear user-placed cells only
document.getElementById('clear-btn').addEventListener('click', () => {
  for (let i = 0; i < COLS * ROWS; i++) {
    if (!fixed[i]) {
      grid[i] = EMPTY;
      colorR[i] = 0; colorG[i] = 0; colorB[i] = 0;
      lifetime[i] = 0;
    }
  }
});

// ============================================================
//  NAVIGATION
// ============================================================
function stopGame() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

function showMenu() {
  stopGame();
  currentMode = null;
  currentLevel = null;
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('win-overlay').className = '';
}

function showLevelSelect() {
  stopGame();
  document.getElementById('menu').style.display = 'none';
  document.getElementById('level-select').style.display = 'flex';
  document.getElementById('game').style.display = 'none';
  document.getElementById('win-overlay').className = '';
}

function startSandbox() {
  currentMode = 'sandbox';
  currentLevel = null;
  levelWon = false;
  levelFailed = false;
  availableMaterials = ALL_MATERIALS;
  selected = SAND;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('level-title').textContent = 'Sandbox';
  document.getElementById('objective').textContent = 'Place any material and watch them interact. Go wild!';
  document.getElementById('win-overlay').className = '';
  clearGrid();
  buildToolbar(availableMaterials);
  startLoop();
}

function startTestingSandbox() {
  startSandbox();
  document.getElementById('level-title').textContent = 'Sandbox (Testing)';
  document.getElementById('objective').textContent = 'A pre-built scene to test materials on. Go wild!';
  buildTestingScene();
}

function buildTestingScene() {
  // ground
  for (let x = 0; x < COLS; x++) {
    for (let y = 175; y < ROWS; y++) {
      setCell(x, y, STONE);
    }
  }
  // grass layer
  for (let x = 0; x < COLS; x++) {
    for (let y = 172; y <= 174; y++) {
      setCell(x, y, PLANT);
    }
  }

  // === LAKE (left side, x=20-100) ===
  // dig basin
  for (let x = 25; x <= 95; x++) {
    const depth = Math.floor(12 - Math.pow((x - 60) / 35, 2) * 12);
    for (let y = 172; y <= 172 + Math.max(depth, 0); y++) {
      setCell(x, y, EMPTY);
    }
  }
  // stone basin walls
  for (let x = 25; x <= 95; x++) {
    const depth = Math.floor(12 - Math.pow((x - 60) / 35, 2) * 12);
    if (depth > 0) {
      setCell(x, 172 + depth + 1, STONE);
    }
  }
  // fill with water
  for (let x = 26; x <= 94; x++) {
    const depth = Math.floor(12 - Math.pow((x - 60) / 35, 2) * 12);
    for (let y = 172; y <= 172 + Math.max(depth - 1, 0); y++) {
      setCell(x, y, WATER);
    }
  }

  // === TREE (center-left, trunk at x=140) ===
  // trunk
  for (let y = 130; y <= 171; y++) {
    for (let dx = -2; dx <= 2; dx++) {
      setCell(140 + dx, y, WOOD);
    }
  }
  // canopy — large leafy circle
  for (let dx = -20; dx <= 20; dx++) {
    for (let dy = -20; dy <= 20; dy++) {
      const dist = dx * dx + dy * dy;
      if (dist <= 400) {
        const cx = 140 + dx, cy = 110 + dy;
        if (inBounds(cx, cy) && getType(cx, cy) === EMPTY) {
          setCell(cx, cy, PLANT);
        }
      }
    }
  }

  // === BUILDING (right side, x=195-265) ===
  const bx1 = 195, bx2 = 265, by1 = 120, by2 = 171;
  // walls
  for (let y = by1; y <= by2; y++) {
    for (let x = bx1; x <= bx2; x++) {
      // outer walls
      if (x === bx1 || x === bx2 || y === by1 || y === by2) {
        setCell(x, y, STONE);
      }
    }
  }
  // roof — peaked
  for (let i = 0; i <= 38; i++) {
    const roofY = by1 - 1 - Math.floor(Math.abs(i - 19) < 19 ? (19 - Math.abs(i - 19)) * 0.6 : 0);
    for (let y = roofY; y <= by1 - 1; y++) {
      setCell(bx1 - 2 + i, y, WOOD);
    }
  }
  // door
  for (let y = by2 - 14; y <= by2; y++) {
    for (let dx = 0; dx <= 6; dx++) {
      setCell(bx1 + 30 + dx, y, EMPTY);
    }
  }
  // windows
  for (let wy of [by1 + 12, by1 + 12]) {
    for (let wx of [bx1 + 10, bx1 + 50]) {
      for (let dx = 0; dx <= 5; dx++) {
        for (let dy = 0; dy <= 5; dy++) {
          setCell(wx + dx, wy + dy, EMPTY);
        }
      }
    }
  }
  // wooden floor inside
  for (let x = bx1 + 1; x < bx2; x++) {
    setCell(x, by2, WOOD);
    setCell(x, by2 - 1, WOOD);
  }
  // interior walls (wood)
  for (let y = by1 + 1; y <= by2 - 2; y++) {
    setCell(bx1 + 25, y, WOOD);
  }
  // oil barrel in left room
  for (let dx = -2; dx <= 2; dx++) {
    for (let dy = -3; dy <= 0; dy++) {
      setCell(bx1 + 12 + dx, by2 - 3 + dy, OIL);
    }
  }

  // === SAND DUNE (far right) ===
  for (let x = 270; x < COLS; x++) {
    const h = Math.floor(8 - (x - 280) * (x - 280) * 0.02);
    for (let y = 172 - Math.max(h, 0); y <= 171; y++) {
      if (inBounds(x, y)) setCell(x, y, SAND);
    }
  }
}

function startLevel(levelIdx) {
  const level = LEVELS[levelIdx];
  currentMode = 'level';
  currentLevel = level;
  levelWon = false;
  levelFailed = false;
  availableMaterials = ALL_MATERIALS.filter(m => level.materials.includes(m.id));
  selected = availableMaterials.length > 0 ? availableMaterials[0].id : EMPTY;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('level-title').textContent = `Level ${level.id}: ${level.name}`;
  document.getElementById('objective').textContent = level.objective;
  document.getElementById('win-overlay').className = '';
  clearGrid();
  // run level setup with fixed-cell wrapper
  level.setup((x, y, type) => setCell(x, y, type, true));
  buildToolbar(availableMaterials);
  startLoop();
}

function resetLevel() {
  if (currentMode === 'sandbox') {
    clearGrid();
    return;
  }
  if (currentLevel) {
    const lvlIdx = LEVELS.indexOf(currentLevel);
    startLevel(lvlIdx);
  }
}

document.getElementById('game-back-btn').addEventListener('click', () => {
  if (currentMode === 'level') showLevelSelect();
  else showMenu();
});
document.getElementById('reset-btn').addEventListener('click', resetLevel);

function returnToLevels() {
  document.getElementById('win-overlay').className = '';
  showLevelSelect();
}

function nextLevel() {
  document.getElementById('win-overlay').className = '';
  if (!currentLevel) return;
  const nextIdx = LEVELS.indexOf(currentLevel) + 1;
  if (nextIdx < LEVELS.length) startLevel(nextIdx);
  else showLevelSelect();
}

// ============================================================
//  WIN DETECTION
// ============================================================
function checkWinCondition() {
  if (!currentLevel || levelWon || levelFailed) return;

  // custom check
  if (currentLevel.checkWin) {
    const result = currentLevel.checkWin(getType, tick);
    if (result === 'win') { triggerWin(); return; }
    if (result === 'fail') { triggerFail(); return; }
    return;
  }

  // standard zone fill check
  if (!currentLevel.winZone || !currentLevel.winType) return;
  const z = currentLevel.winZone;
  let count = 0;
  for (let y = z.y1; y <= z.y2; y++) {
    for (let x = z.x1; x <= z.x2; x++) {
      if (getType(x, y) === currentLevel.winType) count++;
    }
  }
  if (count >= currentLevel.winCount) triggerWin();
}

function triggerWin() {
  levelWon = true;
  const isLast = LEVELS.indexOf(currentLevel) === LEVELS.length - 1;
  document.getElementById('win-msg').textContent = `You completed "${currentLevel.name}"!`;
  document.getElementById('next-level-btn').style.display = isLast ? 'none' : '';
  document.getElementById('win-overlay').className = 'show';
}

function triggerFail() {
  levelFailed = true;
  document.getElementById('win-box').querySelector('h2').textContent = 'Level Failed!';
  document.getElementById('win-msg').textContent = `Mission failed! Try again.`;
  document.getElementById('next-level-btn').textContent = 'Retry';
  document.getElementById('next-level-btn').style.display = '';
  document.getElementById('next-level-btn').onclick = () => {
    document.getElementById('win-overlay').className = '';
    document.getElementById('win-box').querySelector('h2').textContent = 'Level Complete!';
    document.getElementById('next-level-btn').textContent = 'Next Level';
    document.getElementById('next-level-btn').onclick = nextLevel;
    resetLevel();
  };
  document.getElementById('win-overlay').className = 'show';
}

// ============================================================
//  MAIN LOOP
// ============================================================
let frameCount = 0, lastFpsTime = performance.now();
const fpsDisplay = document.getElementById('fps-display');

function startLoop() {
  stopGame();
  frameCount = 0;
  lastFpsTime = performance.now();
  function loop() {
    placeMaterial();
    simulate();

    // level tick (spawners etc)
    if (currentLevel && currentLevel.tick && !levelWon && !levelFailed) {
      currentLevel.tick(
        (x, y, type) => setCell(x, y, type),
        getType, tick
      );
    }

    // win check every 30 frames
    if (currentMode === 'level' && tick % 30 === 0) checkWinCondition();

    render();

    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
      fpsDisplay.textContent = `${frameCount} FPS`;
      frameCount = 0;
      lastFpsTime = now;
    }
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

// ============================================================
//  BUILD LEVEL SELECT GRID
// ============================================================
const levelGrid = document.getElementById('level-grid');
LEVELS.forEach((level, i) => {
  const card = document.createElement('div');
  card.className = 'level-card';
  card.innerHTML = `<div class="num">${level.id}</div><div class="name">${level.name}</div>`;
  card.onclick = () => startLevel(i);
  levelGrid.appendChild(card);
});

// start on menu
showMenu();
</script>
